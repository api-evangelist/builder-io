"""
Content entry base fields shared by all Builder.io content model types.
Every model type (Page, BlogArticle, Symbol, etc.) includes these fields
plus a model-specific 'data' object.
"""
interface ContentEntry {
  id: ID
  name: ID
  ownerId: ID
  modelId: String
  published: String
  lastUpdated: Float
  testRatio: Int
  startDate: Float
  endDate: Float
  createdBy: String
  createdDate: Float
  lastUpdatedBy: String
  screenshot: String
  query: [Query]
  variations: JSONObject
  content: JSONObject
  everything: JSONObject
}

"""
Targeting/query rule used to match content to users.
Each entry in the 'query' array defines one targeting rule.
"""
type Query {
  property: String
  operator: String
  value: JSON
}

