aid: builder-io
name: Builder.io
description: Builder.io is a visual development platform and headless CMS that enables
  teams to build, test, and optimize digital experiences without requiring constant
  developer involvement. The platform combines an AI-powered visual editor with a
  suite of APIs including REST Content, GraphQL, Write, Upload, Image, Assets, and
  Admin APIs for managing and delivering content at scale. Builder.io supports A/B
  testing, personalization, and targeting, making it suitable for marketing and product
  teams working across web and mobile channels. It integrates natively with React,
  Vue, Svelte, Qwik, Angular, and other frameworks through official SDKs, and connects
  to Git-based workflows via GitHub, GitLab, and Bitbucket.
type: Index
